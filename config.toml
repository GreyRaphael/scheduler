# Scheduler Configuration

# Server listen address (can be overridden by CLI --listen or env SCHEDULER_LISTEN)
listen = "0.0.0.0:7070"

# Database path (can be overridden by CLI --db or env SCHEDULER_DB)
db = "./scheduler.db"

# Authentication token (can be overridden by CLI --token or env SCHEDULER_TOKEN)
# token = ""

# Log level (can be overridden by CLI --log-level or env SCHEDULER_LOG_LEVEL)
log_level = "info"
